name: 编译 OpenWrt (x86_64 默认配置)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装编译依赖 (修正版)
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gettext git libncurses5-dev libssl-dev rsync \
        unzip zlib1g-dev file wget python3 python3-pip
        
        # python3-distutils 已被 python3 自带模块替代，安装需要的 python 包
        sudo apt install -y python3-setuptools python3-dev
        
        # Ubuntu 24.04 额外需要的依赖
        sudo apt install -y libelf-dev ecj fastjar java-propose-classpath \
        sharutils uglifyjs squashfs-tools lzma lzma-dev lzma-alone \
        genisoimage dosfstools qemu-utils

    - name: 配置 x86_64 默认配置
      run: |
        # 设置 x86_64 目标平台
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        
        # 生成默认配置
        make defconfig

    - name: 更新 feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 下载源代码
      run: make download -j$(nproc)

    - name: 开始编译
      run: make -j$(nproc)

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-x86-64
        path: |
          bin/targets/x86/64/*.img.gz
          bin/targets/x86/64/*.bin
          bin/targets/x86/64/*.iso
          bin/targets/x86/64/*.tar.gz
