name: 手动编译OpenWrt镜像

on:
  workflow_dispatch:        # 启用手动触发
    inputs:
      config_content:
        description: '.config 文件内容（可直接粘贴）'
        required: false
        default: ''
      ssh_enable:
        description: '是否开启SSH调试（用于排查编译问题）'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync \
        unzip zlib1g-dev file wget

    - name: 准备编译环境
      run: |
        # 如果仓库中已有 config.seed 或 .config，可以复制使用
        if [ -f "config.seed" ]; then
          cp config.seed .config
        elif [ -f ".config" ]; then
          echo "使用仓库中的 .config 文件"
        elif [ -n "${{ github.event.inputs.config_content }}" ]; then
          echo "${{ github.event.inputs.config_content }}" > .config
        else
          echo "未提供配置，使用默认 x86_64 配置"
          make defconfig
        fi

    - name: 下载源代码更新
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 配置编译选项
      run: |
        # 如果提供了配置内容，确保更新
        if [ -n "${{ github.event.inputs.config_content }}" ]; then
          echo "${{ github.event.inputs.config_content }}" > .config
        fi
        make defconfig
        make download -j$(nproc)

    - name: 开启SSH调试（可选）
      if: ${{ github.event.inputs.ssh_enable == 'true' }}
      uses: mxschmitt/action-tmate@v3

    - name: 开始编译
      run: |
        make -j$(nproc) || make -j1 V=s  # 失败时单线程详细输出

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-images
        path: |
          bin/targets/**/*.img
          bin/targets/**/*.img.gz
          bin/targets/**/*.bin
          bin/targets/**/*.elf
          bin/targets/**/*.tar.gz
